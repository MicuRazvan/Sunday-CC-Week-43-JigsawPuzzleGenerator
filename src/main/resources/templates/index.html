<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Jigsaw Puzzle Generator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f3f4f6;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            background-color: #ffffff;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 100%;
        }
        h1 {
            text-align: center;
            color: #1f2937;
            margin-bottom: 1.5rem;
        }
        .form-group {
            margin-bottom: 1.2rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #4b5563;
        }
        input[type="file"], select {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 0.75rem;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #1d4ed8;
        }
        .error-message {
            background-color: #fee2e2;
            color: #991b1b;
            padding: 0.75rem;
            border-radius: 4px;
            margin-bottom: 1rem;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Jigsaw Puzzle Generator</h1>

    <div th:if="${error}" class="error-message" th:text="${error}"></div>

    <form th:action="@{/generate}" method="POST" enctype="multipart/form-data">
        <div class="form-group">
            <label for="file">Choose Image</label>
            <input type="file" id="file" name="file" accept="image/*" required />
        </div>

        <div class="form-group">
            <label for="pieces">Number of Pieces</label>
            <select id="pieces" name="pieces">
                <option value="16" selected>16 Pieces (4x4 Grid)</option>
                <option value="64">64 Pieces (8x8 Grid)</option>
                <option value="128">128 Pieces (16x8 Grid)</option>
            </select>
        </div>

        <button type="submit">Create Puzzle</button>
    </form>
</div>
</body>
</html>
